# https://taskfile.dev

version: '3'

vars:
  PYTHON_VERSION: '3.10.3'

tasks:

  install:
    desc: Install all dependencies
    cmds: 
      - task: install:python
      - task: install:uv
      - task: install:npm

  install:python:
    desc: Install pyenv & Python v. {{.PYTHON_VERSION}}
    cmds:
      - curl https://pyenv.run | bash
      - pyenv install -v {{.PYTHON_VERSION}}
      - python3 --version

  install:uv:
    desc: Install uv
    cmds:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - uv --version

  install:npm:
    desc: Install npm, NodeJS, npx
    cmds:
      - sudo apt update
      - sudo apt install npm
      - npm install -g node
      - npm install -g npx 
      - npm -v
      - node -v
      - npx -v

  infra:
    desc: Spin up infra
    cmds: 
      - echo "Starting docker containers..."
      - docker compose up -d mankkoo-postgres pgadmin

  infra:down:
    desc: Tear down infra
    cmds: 
      - echo "Stopping docker containers..."
      - docker compose down

  run:
    desc: Run entire project in Docker
    dir: services/mankkoo/mankkoo
    cmds:
      - task: infra
      - docker compose up -d

  mankkoo:dev:
    desc: Run mankkoo core backend in a dev mode
    dir: services/mankkoo
    cmds:
      - task: infra
      - echo "Starting mankkoo core..."
      - uv run flask run --reload

  mankkoo:test:
    desc: Run tests for mankkoo core
    dir: services/mankkoo
    cmds:
      - echo "Running tests for mankkoo core..."
      - uv run pytest -s -vv --cov=./mankkoo
      # uncomment below step to run a single test file
      # - uv run pytest -s -vv --cov=./mankkoo tests/controller/stream_controller_test.py

  update:
    desc: Update dependencies for all services
    cmds:
      - task: mankkoo:update

  mankkoo:update:
    desc: Update dependencies for mankkoo core
    dir: services/mankkoo
    cmds:
      - echo "Updating dependencies for mankkoo core..."
      - uv lock --upgrade

  mankkoo:req:
    desc: Generate requirements.txt file from uv
    dir: services/mankkoo
    cmds:
      - echo "Generate requirements.txt file..."
      - uv export --no-hashes --no-dev -o requirements.txt

  mankkoo:lint:
    desc: Run linter
    dir: services/mankkoo
    cmds:
      - echo "Linting mankkoo core..."
      - uv run autoflake --in-place --remove-all-unused-imports --remove-unused-variables --ignore-init-module-imports -r .
      - uv run isort .
      - uv run autopep8 --in-place --aggressive --recursive .
      - uv run black .

  ui:dev:
    desc: Run mankkoo UI in a dev mode
    dir: services/mankkoo-ui
    cmds:
      - echo "Starting mankkoo UI..."
      - npm run dev --turbo

  ui:build:
    desc: Build UI 
    dir: services/mankkoo-ui
    cmds:
      - echo "Starting building UI..."
      - npm run build

  docker:build:
    desc: Build Docker images for both services (tagged :latest and :YYYYMMDD_HHmm)
    cmds:
      - task: docker:build:mankkoo
      - task: docker:build:ui

  docker:build:mankkoo:
    desc: Build Docker image for mankkoo core backend (tagged :latest and :YYYYMMDD_HHmm)
    vars:
      TIMESTAMP:
        sh: date +%Y%m%d_%H%M
    cmds:
      - echo "Building mankkoo core image..."
      - docker build -t mankkoo-core:latest -t mankkoo-core:{{.TIMESTAMP}} ./services/mankkoo
      - echo "Built mankkoo-core:latest and mankkoo-core:{{.TIMESTAMP}}"

  docker:build:ui:
    desc: Build Docker image for mankkoo UI (tagged :latest and :YYYYMMDD_HHmm)
    vars:
      TIMESTAMP:
        sh: date +%Y%m%d_%H%M
    cmds:
      - echo "Building mankkoo UI image..."
      - docker build -t mankkoo-ui:latest -t mankkoo-ui:{{.TIMESTAMP}} ./services/mankkoo-ui
      - echo "Built mankkoo-ui:latest and mankkoo-ui:{{.TIMESTAMP}}"

  test:
    desc: Run all tests
    cmds:
      - task: mankkoo:test

  backup:
    desc: Create PostgreSQL backup (all in Docker)
    vars:
      db: mankkoo
    cmds:
      - echo "Starting backuping '{{.db}}' database..."
      - docker cp services/infra/postgres/backup_db.sh mankkoo-postgres:/tmp/backup_db.sh
      - docker exec mankkoo-postgres chmod +x /tmp/backup_db.sh
      - |
        backup_file=$(docker exec mankkoo-postgres /bin/bash -c "/tmp/backup_db.sh {{.db}}") && \
        docker cp mankkoo-postgres:/tmp/$backup_file backup/$backup_file && \
        docker exec mankkoo-postgres /bin/bash -c "rm /tmp/$backup_file /tmp/backup_db.sh"
      - echo "Backup for '{{.db}}' database completed."

  restore:
    desc: Restoring backup data for PostgreSQL
    vars:
      file: mankkoo_20260217_1943
      db: mankkoo
    cmds:
      - echo "Starting restoring '{{.db}}' database. Copying backup..."
      - docker cp backup/{{.file}}.dump.gz mankkoo-postgres:/tmp/{{.file}}.dump.gz
      - docker cp services/infra/postgres/restore_db.sh mankkoo-postgres:/tmp/restore_db.sh
      - docker exec mankkoo-postgres /bin/bash -c "chmod +x /tmp/restore_db.sh"
      - docker exec mankkoo-postgres /bin/bash -c "/tmp/restore_db.sh {{.file}} {{.db}}"
      - docker exec mankkoo-postgres /bin/bash -c "rm /tmp/restore_db.sh"
      - echo "Backup restored."